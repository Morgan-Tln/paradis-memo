<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Paradis du Fruit — Master Framework v8</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg-main: #f8f7f4;
      --panel-bg: #ffffff;
      --text-dark: #0f172a;
      --text-muted: #64748b;
      --primary-green: #073314;
      --accent-gold: #eab308;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-tap-highlight-color: transparent; 
    }

    /* Structures de cartes unifiées */
    .card-ui {
      background: var(--panel-bg);
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      box-shadow: 0 4px 20px rgba(15,23,42,0.02);
      overflow: hidden;
    }

    .card-hover {
      transition: all 0.2s ease;
    }
    .card-hover:active {
      background-color: #fcfbfa;
    }

    /* Grille élastique adaptative */
    .responsive-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      width: 100%;
    }

    @media (min-width: 680px) {
      .responsive-grid {
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
      }
    }

    .touch-target {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .btn-interactive {
      transition: transform 0.1s ease, filter 0.2s ease;
    }
    .btn-interactive:active {
      transform: scale(0.97);
      filter: brightness(0.95);
    }

    .tab-container {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-container::-webkit-scrollbar {
      display: none;
    }

    .animate-fade {
      animation: tabFade 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes tabFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  

    .input-ui {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
      background: #ffffff;
      color: var(--text-dark);
    }
    .input-ui:focus {
      border-color: var(--primary-green);
      box-shadow: 0 0 0 3px rgba(7, 51, 20, 0.08);
    }

    .pill-ui {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .mini-stat {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      color: #fff;
      border-radius: 14px;
      padding: 10px 14px;
      min-width: 92px;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="app.js"></script>

</body>
</html>
